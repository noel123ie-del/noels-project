<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Parser Tester</title>
  <style>
    body { font-family: monospace; background: #0a0e27; color: #e5e7eb; padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { color: #00d4ff; margin-bottom: 20px; }
    textarea { width: 100%; height: 300px; background: #1a1f3a; color: #e5e7eb; border: 1px solid #00d4ff; padding: 10px; border-radius: 8px; font-family: monospace; }
    button { background: #00d4ff; color: #000; padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background: #0099ff; }
    .output { background: #1a1f3a; border: 1px solid #00d4ff; padding: 15px; margin-top: 20px; border-radius: 8px; max-height: 500px; overflow-y: auto; }
    .success { color: #4ade80; }
    .error { color: #ff4757; }
    .info { color: #00d4ff; }
  </style>
</head>
<body>
<div class="container">
  <h1>🧪 CSV Parser Test</h1>
  <p>Paste your CSV data below and click Test:</p>

  <textarea id="csvInput" placeholder="Paste your CSV here...">Posted Account, Posted Transactions Date, Description1, Description2, Description3, Debit Amount, Credit Amount,Balance,Posted Currency,Transaction Type,Local Currency Amount,Local Currency
"934127 - 07676420","01/04/2026","*MOBI PER","","","400.00",,"243.26",EUR,"Debit"," 400.00",EUR
"934127 - 07676420","02/04/2026","TOP CLASS FUN","","",,"1,027.42","685.41",EUR,"Credit"," 1,027.42",EUR
"934127 - 07676420","20/04/2026","VDP-Amazon.ie","","","20.11",,"-111.48",EUR,"Debit"," 20.11",EUR
"934127 - 07676420","05/05/2026","VDP-Revolut**8564*","","","600.00",,"926.30",EUR,"Debit"," 600.00",EUR</textarea>

  <button onclick="testParser()">🚀 Test Parser</button>

  <div class="output" id="output"></div>
</div>

<script>
function parseCSVLine(line) {
  const result = [];
  let current = '';
  let insideQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const char = line[i];
    if (char === '"') insideQuotes = !insideQuotes;
    else if (char === ',' && !insideQuotes) { result.push(current.trim()); current = ''; }
    else current += char;
  }
  result.push(current.trim());
  return result.map(c => c.replace(/^"|"$/g, ''));
}

function testParser() {
  const csvData = document.getElementById('csvInput').value;
  const output = document.getElementById('output');
  let html = '';

  const lines = csvData.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) {
    output.innerHTML = '<div class="error">❌ No data to parse</div>';
    return;
  }

  const headerCols = parseCSVLine(lines[0]);
  const headerLower = headerCols.map(h => h.toLowerCase());

  html += `<div class="info"><strong>📋 HEADER DETECTION</strong></div>`;
  html += `<div>Found ${headerCols.length} columns</div>`;

  let dateIdx = -1, debitIdx = -1, creditIdx = -1, descIdx = -1;

  for (let i = 0; i < headerLower.length; i++) {
    if (/date|posted|transaction|time/i.test(headerLower[i])) {
      dateIdx = i;
      html += `<div class="success">✓ Date: Col ${i+1} "${headerCols[i]}"</div>`;
    }
    if (/debit|withdrawn|spent|charge/.test(headerLower[i])) {
      debitIdx = i;
      html += `<div class="success">✓ Debit: Col ${i+1} "${headerCols[i]}"</div>`;
    }
    if (/credit|income|deposit/.test(headerLower[i])) {
      creditIdx = i;
      html += `<div class="success">✓ Credit: Col ${i+1} "${headerCols[i]}"</div>`;
    }
    if (/description|merchant|ref|payee|note|detail|narration/i.test(headerLower[i])) {
      descIdx = i;
      html += `<div class="success">✓ Description: Col ${i+1} "${headerCols[i]}"</div>`;
    }
  }

  if (dateIdx === -1) dateIdx = 0;
  if (descIdx === -1) descIdx = 2;
  if (debitIdx === -1 && creditIdx === -1) debitIdx = 5;

  html += `<br><div class="info"><strong>📊 PARSING ${lines.length - 1} TRANSACTIONS</strong></div>`;

  let imported = 0;
  for (let i = 1; i < lines.length; i++) {
    const cols = parseCSVLine(lines[i]);
    const dateStr = cols[dateIdx] || '';
    const desc = cols[descIdx] || '';

    let amountStr = '0';
    if (debitIdx >= 0 && cols[debitIdx] && cols[debitIdx].trim()) {
      amountStr = cols[debitIdx];
    } else if (creditIdx >= 0 && cols[creditIdx] && cols[creditIdx].trim()) {
      amountStr = cols[creditIdx];
    }

    let date = null;
    if (/^\d{2}\/\d{2}\/\d{4}/.test(dateStr)) {
      const parts = dateStr.split('/');
      date = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
    }

    let cleanAmount = amountStr.replace(/[€$£¥,\s]/g, '').trim();
    const amount = Math.abs(parseFloat(cleanAmount));

    if (date && amount > 0 && desc) {
      html += `<div class="success">✅ Row ${i}: ${date} | ${desc} | €${amount.toFixed(2)}</div>`;
      imported++;
    } else {
      html += `<div class="error">❌ Row ${i}: Missing data (date=${date}, amt=${amount}, desc=${!!desc})</div>`;
    }
  }

  html += `<br><div class="success"><strong>✅ SUCCESS: Imported ${imported}/${lines.length - 1} transactions</strong></div>`;
  output.innerHTML = html;
}

// Auto-test on load
setTimeout(() => testParser(), 100);
</script>
</body>
</html>
