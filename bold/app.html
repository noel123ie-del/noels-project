<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrift - Smart Spending Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff5e6 0%, #ffe6f0 100%);
      color: #1a1a2e;
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      border-bottom: 3px solid #ff6b35;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }
    .logo { font-size: 1.6rem; font-weight: 900; color: #ff6b35; }
    .btn { padding: 12px 28px; border: none; background: linear-gradient(135deg, #ff6b35, #f7931e); color: white; border-radius: 12px; cursor: pointer; font-weight: 800; box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3); }
    .btn:hover { transform: translateY(-2px); }
    nav { display: flex; gap: 32px; padding: 0 24px; border-bottom: 2px solid #f0f0f0; background: white; }
    nav button { border: none; background: none; padding: 16px 0; font-size: 0.9rem; color: #666; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 700; }
    nav button.active { color: #ff6b35; border-bottom: 3px solid #ff6b35; }
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 24px; }
    .hero { background: white; border-radius: 20px; padding: 80px 60px; text-align: center; margin-bottom: 60px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    .hero h1 { font-size: 3.5rem; margin-bottom: 20px; font-weight: 900; color: #1a1a2e; }
    .hero h1 span { color: #ff6b35; }
    .hero p { font-size: 1.1rem; color: #666; max-width: 600px; margin: 0 auto 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 60px 0; }
    .stat { background: white; padding: 32px 24px; border-radius: 16px; border-top: 4px solid #ff6b35; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
    .stat:nth-child(2) { border-top-color: #f7931e; }
    .stat:nth-child(3) { border-top-color: #ff4757; }
    .stat:nth-child(4) { border-top-color: #26de81; }
    .stat-label { font-size: 0.75rem; color: #999; text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px; }
    .stat-value { font-size: 2.5rem; font-weight: 900; color: #1a1a2e; }
    @media (max-width: 768px) {
      .hero { padding: 40px 24px; }
      .hero h1 { font-size: 2rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">⚡ THRIFT</div>
  <button class="btn">Start Now</button>
</header>

<nav>
  <button class="active">Home</button>
  <button>Dashboard</button>
  <button>Analytics</button>
  <button>Settings</button>
</nav>

<div class="container">
  <div class="hero">
    <h1>Your Money <span>Simplified</span></h1>
    <p>Track spending. Spot savings. Take control. No complicated dashboards. No confusing charts.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">This Week</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">This Month</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Income</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-value">€0</div>
    </div>
  </div>

  <p style="color: #999; text-align: center; margin-top: 60px; font-size: 0.9rem;">🚀 Fast · 🔒 Private · ✨ Beautiful</p>
</div>
</body>
</html>
