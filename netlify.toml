[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Pretty URLs — serve /bold/app from /bold/app.html etc.
[[redirects]]
  from = "/bold/app"
  to = "/bold/app.html"
  status = 200

[[redirects]]
  from = "/locked/app"
  to = "/locked/app.html"
  status = 200

[[redirects]]
  from = "/locked-v1.10/app"
  to = "/locked-v1.10/app.html"
  status = 200

[[redirects]]
  from = "/locked-v1.20/app"
  to = "/locked-v1.20/app.html"
  status = 200

[[redirects]]
  from = "/locked-v1.30/app"
  to = "/locked-v1.30/app.html"
  status = 200

[[redirects]]
  from = "/locked-v1.40/app"
  to = "/locked-v1.40/app.html"
  status = 200

[[redirects]]
  from = "/locked-v1.50/app"
  to = "/locked-v1.50/app.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
