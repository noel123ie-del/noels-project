<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrift - Smart Spending Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #faf7f2;
      color: #3d3026;
      line-height: 1.8;
    }
    header {
      border-bottom: 1px solid #ede6dd;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.8rem; font-weight: 700; color: #8b6f47; letter-spacing: 3px; }
    .btn { padding: 12px 28px; border: 2px solid #8b6f47; background: #8b6f47; color: #faf7f2; border-radius: 2px; cursor: pointer; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    nav { display: flex; gap: 40px; padding: 0 24px; border-bottom: 1px solid #ede6dd; }
    nav button { border: none; background: none; padding: 18px 0; font-size: 0.95rem; color: #8b6f47; cursor: pointer; border-bottom: 2px solid transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    nav button.active { color: #3d3026; border-bottom: 2px solid #3d3026; }
    .container { max-width: 1200px; margin: 0 auto; padding: 80px 24px; }
    .hero h1 { font-size: 3.8rem; margin-bottom: 20px; font-weight: 400; line-height: 1.1; color: #3d3026; }
    .hero p { font-size: 1.2rem; color: #8b6f47; max-width: 650px; margin-bottom: 48px; font-style: italic; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; margin: 80px 0; }
    .stat { text-align: center; padding: 40px 24px; border-top: 2px solid #8b6f47; }
    .stat-label { font-size: 0.8rem; color: #8b6f47; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; }
    .stat-value { font-size: 2.8rem; font-weight: 700; color: #3d3026; }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">THRIFT</div>
  <button class="btn">Begin</button>
</header>

<nav>
  <button class="active">Home</button>
  <button>Dashboard</button>
  <button>Insights</button>
  <button>Account</button>
</nav>

<div class="container">
  <div class="hero">
    <h1>Understand Your Spending</h1>
    <p>Elegant simplicity. Clear insights. Financial clarity.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Weekly</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Monthly</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Income</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Remaining</div>
      <div class="stat-value">€0</div>
    </div>
  </div>

  <p style="color: #8b6f47; text-align: center; margin-top: 80px; font-size: 0.95rem; letter-spacing: 2px;">EST. 2026 · PRIVATE · YOURS</p>
</div>
</body>
</html>
