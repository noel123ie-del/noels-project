<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noel - Smart Spending Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      line-height: 1.6;
    }
    header {
      background: #16213e;
      border-bottom: 2px solid #00d4aa;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 212, 170, 0.1);
    }
    .logo { font-size: 1.3rem; font-weight: 800; color: #00d4aa; }
    nav { display: flex; gap: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 24px; background: #16213e; }
    nav button { border: none; background: none; padding: 12px 16px; color: #8892b0; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 600; }
    nav button.active { color: #00d4aa; border-bottom-color: #00d4aa; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .month-header { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 24px; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: linear-gradient(135deg, #16213e, #0f3460);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .stat-card.income { border-left: 4px solid #00d4aa; }
    .stat-card.expense { border-left: 4px solid #ff6b9d; }
    .stat-card.balance { border-left: 4px solid #4caf50; }
    .stat-label { font-size: 0.85rem; color: #8892b0; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: #fff; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
    .chart-box {
      background: linear-gradient(135deg, #16213e, #0f3460);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .chart-box h3 { font-size: 1.1rem; margin-bottom: 16px; color: #fff; }
    .chart-wrapper { position: relative; height: 300px; }
    canvas { max-height: 300px !important; }
    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .form-section {
      background: linear-gradient(135deg, #16213e, #0f3460);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .form-section h3 { font-size: 1.2rem; margin-bottom: 16px; color: #fff; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; }
    .form-group label { font-size: 0.85rem; color: #8892b0; margin-bottom: 6px; text-transform: uppercase; }
    .form-group input, .form-group select { padding: 10px 12px; border: 1px solid #444; background: #0f3460; color: #e0e0e0; border-radius: 8px; font-family: inherit; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4aa; box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.1); }
    .btn-primary { background: linear-gradient(135deg, #00d4aa, #00a881); color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; }
    .transaction-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .transaction-desc { font-weight: 600; color: #e0e0e0; }
    .transaction-meta { font-size: 0.8rem; color: #8892b0; }
    .transaction-amount { font-weight: 800; color: #ff6b9d; }
    .delete-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 1.2rem; }
    .delete-btn:hover { color: #ff6b9d; }
    @media (max-width: 768px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
      .month-header { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">💰 Noel</div>
  <button class="btn-primary" onclick="switchSection(null, 'dashboard')" style="padding: 8px 16px; font-size: 0.9rem;">Dashboard</button>
</header>

<nav>
  <button class="nav-btn active" onclick="switchSection(event, 'dashboard')">Dashboard</button>
  <button class="nav-btn" onclick="switchSection(event, 'daily-log')">Add Spending</button>
  <button class="nav-btn" onclick="switchSection(event, 'insights')">Insights</button>
  <button class="nav-btn" onclick="switchSection(event, 'settings')">Settings</button>
</nav>

<div class="container">

  <!-- Dashboard Section -->
  <div id="dashboard" class="section active">
    <div class="month-header" id="monthHeader">September</div>

    <div class="stats-row">
      <div class="stat-card income">
        <div class="stat-label">Total Income</div>
        <div class="stat-value" id="dashIncome">€0</div>
      </div>
      <div class="stat-card expense">
        <div class="stat-label">Total Expenses</div>
        <div class="stat-value" id="dashMonthSpending">€0</div>
      </div>
      <div class="stat-card balance">
        <div class="stat-label">Net Income</div>
        <div class="stat-value" id="dashNetWorth">€0</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="chart-box">
        <h3>📊 Spending by Category</h3>
        <div class="chart-wrapper">
          <canvas id="categoryChart"></canvas>
        </div>
      </div>
      <div class="chart-box">
        <h3>📈 6-Month Trend</h3>
        <div class="chart-wrapper">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>📝 Recent Spending</h3>
      <div style="max-height: 400px; overflow-y: auto;">
        <div id="filteredTransactionsList"></div>
      </div>
    </div>
  </div>

  <!-- Daily Log Section -->
  <div id="daily-log" class="section">
    <div class="form-section">
      <h3>➕ Quick Add Spending</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="logDate">
        </div>
        <div class="form-group">
          <label>Amount (€)</label>
          <input type="number" id="logAmount" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="logCategory">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Entertainment</option>
            <option>Utilities</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="logDesc" placeholder="e.g. Coffee at Starbucks">
      </div>
      <button class="btn-primary" onclick="addDailyLog()" style="width: 100%; margin-top: 16px;">Log Spending</button>
    </div>
  </div>

  <!-- Insights Section -->
  <div id="insights" class="section">
    <div class="form-section">
      <h3>💡 Smart Insights</h3>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Week Spending</div>
          <div class="stat-value" id="insWeekSpending">€0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Month Spending</div>
          <div class="stat-value" id="insMonthSpending">€0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Balance</div>
          <div class="stat-value" id="insBalance">€0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Section -->
  <div id="settings" class="section">
    <div class="form-section">
      <h3>⚙️ Budget Settings</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Weekly Budget (€)</label>
          <input type="number" id="weeklyBudgetInput" placeholder="0.00" step="0.01">
        </div>
      </div>
      <button class="btn-primary" onclick="saveBudgetSettings()" style="width: 100%; margin-top: 16px;">Save Settings</button>
    </div>

    <div class="form-section">
      <h3>📥 Import Bank Data</h3>
      <p style="color: #8892b0; margin-bottom: 16px; font-size: 0.9rem;">Works with any bank. CSV format.</p>
      <button class="btn-primary" onclick="document.getElementById('csvFile').click()" style="width: 100%;">Choose File</button>
      <input type="file" id="csvFile" accept=".csv" onchange="importFile(event)" style="display: none;">
    </div>

    <div class="form-section">
      <h3>⚙️ Data</h3>
      <button class="btn-primary" onclick="loadSampleData()" style="width: 100%; margin-bottom: 12px;">Load Sample Data</button>
      <button class="btn-primary" onclick="clearAllData()" style="width: 100%; background: #e74c3c;">Clear All Data</button>
    </div>
  </div>

</div>

<script>
let txns = JSON.parse(localStorage.getItem('txns') || '[]');
let income = JSON.parse(localStorage.getItem('income') || '[]');
let weeklyBudget = parseFloat(localStorage.getItem('weeklyBudget') || '0');
let chartInstances = {};

const categories = ['Food', 'Transport', 'Shopping', 'Entertainment', 'Utilities', 'Other'];
const autoCategories = {
  'Food': /supermarket|restaurant|cafe|coffee|pizza|burger|grocery|tesco|dunnes|lidl|aldi|costa|starbucks/i,
  'Transport': /taxi|uber|bus|train|petrol|fuel|parking|transport|metro/i,
  'Shopping': /amazon|shop|mall|store|sainsbury|next|h&m|zara|shopping/i,
  'Entertainment': /cinema|movie|netflix|spotify|game|pub|bar|concert|sports/i,
  'Utilities': /electricity|water|gas|broadband|phone|bill|esb|mortgage|rent|insurance/i,
};

function save() {
  localStorage.setItem('txns', JSON.stringify(txns));
  localStorage.setItem('income', JSON.stringify(income));
  localStorage.setItem('weeklyBudget', weeklyBudget);
}

function switchSection(event, sectionId) {
  if (event) event.preventDefault();
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(sectionId).classList.add('active');
  if (event?.target) event.target.classList.add('active');
  render();
  window.scrollTo(0, 0);
}

function addDailyLog() {
  const date = document.getElementById('logDate').value || new Date().toISOString().split('T')[0];
  const amount = parseFloat(document.getElementById('logAmount').value);
  const cat = document.getElementById('logCategory').value;
  const desc = document.getElementById('logDesc').value;
  if (!amount || amount <= 0) return alert('Enter a valid amount');
  txns.push({ date, amount, category: cat, desc, id: Date.now() });
  save();
  document.getElementById('logAmount').value = '';
  document.getElementById('logDesc').value = '';
  render();
  alert('✅ Spending logged!');
}

function saveBudgetSettings() {
  weeklyBudget = parseFloat(document.getElementById('weeklyBudgetInput').value) || 0;
  save();
  alert('✅ Settings saved!');
}

function deleteTxn(id) {
  if (confirm('Delete this transaction?')) {
    txns = txns.filter(t => t.id !== id);
    save();
    render();
  }
}

function loadSampleData() {
  txns = [
    { id: 1, date: '2026-05-05', amount: 45, category: 'Food', desc: 'Supermarket' },
    { id: 2, date: '2026-05-04', amount: 15, category: 'Transport', desc: 'Bus fare' },
    { id: 3, date: '2026-05-03', amount: 120, category: 'Shopping', desc: 'Clothing' },
    { id: 4, date: '2026-05-02', amount: 8.5, category: 'Food', desc: 'Coffee' },
    { id: 5, date: '2026-05-01', amount: 60, category: 'Entertainment', desc: 'Cinema' },
    { id: 6, date: '2026-04-30', amount: 99, category: 'Utilities', desc: 'Internet' },
  ];
  income = [{ id: 1, date: '2026-05-01', amount: 3000, desc: 'Salary' }];
  weeklyBudget = 300;
  save();
  render();
  alert('✅ Demo data loaded!');
}

function clearAllData() {
  if (confirm('Delete all data?')) {
    txns = []; income = []; weeklyBudget = 0;
    save();
    render();
    alert('✅ Data cleared');
  }
}

function importFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => parseCSV(e.target.result);
  reader.readAsText(file);
}

function parseCSV(csvText) {
  const lines = csvText.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return alert('Invalid CSV');
  const dateIdx = lines[0].split(',').findIndex(h => /date|posting/i.test(h));
  const amountIdx = lines[0].split(',').findIndex(h => /amount|debit|credit/i.test(h));
  const descIdx = lines[0].split(',').findIndex(h => /description|narration/i.test(h));

  let imported = 0;
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim());
    const date = cols[dateIdx >= 0 ? dateIdx : 0]?.trim();
    const amountStr = cols[amountIdx >= 0 ? amountIdx : 1]?.trim();
    const desc = cols[descIdx >= 0 ? descIdx : 2]?.trim();
    if (!date || !amountStr || !desc) continue;
    const amount = parseFloat(amountStr.replace(/[€$£,]/g, ''));
    if (isNaN(amount)) continue;
    let category = 'Other';
    for (const [cat, regex] of Object.entries(autoCategories)) {
      if (regex.test(desc)) { category = cat; break; }
    }
    txns.push({ id: Date.now() + Math.random(), date, amount: Math.abs(amount), category, desc });
    imported++;
  }
  save();
  render();
  alert(`✅ Imported ${imported} transactions!`);
}

function sumByDate(arr, field = 'amount', startDate = null, endDate = null) {
  return arr.filter(item => {
    if (!startDate || !endDate) return true;
    return item.date >= startDate && item.date <= endDate;
  }).reduce((sum, item) => sum + (item[field] || 0), 0);
}

function filterTransactions() {
  let filtered = txns.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20);
  const html = filtered.length ? filtered.map(t => `
    <div class="transaction-item">
      <div>
        <div class="transaction-desc">${t.desc}</div>
        <div class="transaction-meta">${t.category} • ${t.date}</div>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="transaction-amount">€${t.amount.toFixed(2)}</div>
        <button class="delete-btn" onclick="deleteTxn(${t.id})">×</button>
      </div>
    </div>
  `).join('') : '<div style="text-align: center; color: #8892b0; padding: 20px;">No transactions yet</div>';
  const container = document.getElementById('filteredTransactionsList');
  if (container) container.innerHTML = html;
}

function renderCharts() {
  const categorySpending = {};
  categories.forEach(cat => categorySpending[cat] = 0);
  txns.forEach(t => {
    if (categorySpending.hasOwnProperty(t.category)) categorySpending[t.category] += t.amount;
  });

  if (chartInstances.categoryChart) chartInstances.categoryChart.destroy();
  const chartCanvas = document.getElementById('categoryChart');
  if (chartCanvas) {
    chartInstances.categoryChart = new Chart(chartCanvas, {
      type: 'doughnut',
      data: {
        labels: Object.keys(categorySpending),
        datasets: [{
          data: Object.values(categorySpending),
          backgroundColor: ['#00d4aa', '#ff6b9d', '#ffd700', '#4caf50', '#0099ff', '#9c27b0'],
          borderColor: '#1a1a2e',
          borderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { color: '#e0e0e0', padding: 12, font: { size: 11, weight: 'bold' } } } }
      }
    });
  }

  const monthLabels = [];
  const monthData = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    monthLabels.push(d.toLocaleString('en-US', { month: 'short' }));
    const monthS = new Date(d.getFullYear(), d.getMonth(), 1).toISOString().split('T')[0];
    const monthE = new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().split('T')[0];
    monthData.push(sumByDate(txns, 'amount', monthS, monthE));
  }

  if (chartInstances.trendChart) chartInstances.trendChart.destroy();
  const trendCanvas = document.getElementById('trendChart');
  if (trendCanvas) {
    chartInstances.trendChart = new Chart(trendCanvas, {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [{
          label: 'Monthly Spending',
          data: monthData,
          borderColor: '#00d4aa',
          backgroundColor: 'rgba(0, 212, 170, 0.1)',
          tension: 0.4,
          fill: true,
          pointRadius: 5,
          pointBackgroundColor: '#00d4aa',
          pointBorderColor: '#1a1a2e',
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#e0e0e0', font: { weight: 'bold' }, padding: 16 } } },
        scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8892b0' } }, x: { ticks: { color: '#8892b0' }, grid: { color: 'rgba(255,255,255,0.05)' } } }
      }
    });
  }
}

function render() {
  const today = new Date().toISOString().split('T')[0];
  const [wStart, wEnd] = [new Date(new Date().getTime() - 7*24*60*60*1000).toISOString().split('T')[0], today];
  const [mStart, mEnd] = [new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0], today];

  const weekSpent = sumByDate(txns, 'amount', wStart, wEnd);
  const monthSpent = sumByDate(txns, 'amount', mStart, mEnd);
  const totalIncome = sumByDate(income, 'amount');
  const balance = totalIncome - sumByDate(txns, 'amount');

  const monthName = new Date().toLocaleString('en-US', { month: 'long' });
  document.getElementById('monthHeader').textContent = monthName;

  document.getElementById('dashIncome').textContent = `€${totalIncome.toFixed(2)}`;
  document.getElementById('dashMonthSpending').textContent = `€${monthSpent.toFixed(2)}`;
  document.getElementById('dashNetWorth').textContent = `€${balance.toFixed(2)}`;

  document.getElementById('insWeekSpending').textContent = `€${weekSpent.toFixed(2)}`;
  document.getElementById('insMonthSpending').textContent = `€${monthSpent.toFixed(2)}`;
  document.getElementById('insBalance').textContent = `€${balance.toFixed(2)}`;

  document.getElementById('weeklyBudgetInput').value = weeklyBudget;
  document.getElementById('logDate').value = today;

  filterTransactions();
  renderCharts();
}

render();
</script>

</body>
</html>
