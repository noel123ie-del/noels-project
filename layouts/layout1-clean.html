<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrift - Smart Spending Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      line-height: 1.6;
    }
    header {
      border-bottom: 1px solid #f0f0f0;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
    .btn { padding: 10px 20px; border: 1px solid #000; background: #000; color: white; border-radius: 4px; cursor: pointer; }
    nav { display: flex; gap: 32px; padding: 0 24px; border-bottom: 1px solid #f0f0f0; }
    nav button { border: none; background: none; padding: 16px 0; font-size: 0.9rem; border-bottom: 2px solid transparent; cursor: pointer; }
    nav button.active { border-bottom: 2px solid #000; }
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 24px; }
    .hero h1 { font-size: 3.5rem; margin-bottom: 16px; font-weight: 800; line-height: 1.1; }
    .hero p { font-size: 1.1rem; color: #666; max-width: 600px; margin-bottom: 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin: 60px 0; }
    .stat { border: 1px solid #f0f0f0; padding: 32px; }
    .stat-label { font-size: 0.85rem; color: #999; text-transform: uppercase; margin-bottom: 12px; }
    .stat-value { font-size: 2.5rem; font-weight: 800; }
    .section { display: none; }
    .section.active { display: block; }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      nav { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">Thrift</div>
  <button class="btn">Get Started</button>
</header>

<nav>
  <button class="active">Home</button>
  <button>Dashboard</button>
  <button>Add Spending</button>
  <button>Settings</button>
</nav>

<div class="container">
  <div class="hero">
    <h1>Spend Less. Save More. Understand Why.</h1>
    <p>Know exactly where your money goes. Beautiful charts. Smart insights. No complexity.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">This Week</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">This Month</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Income</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-value">€0</div>
    </div>
  </div>

  <p style="color: #999; text-align: center; margin-top: 60px;">Simple. Private. Yours.</p>
</div>
</body>
</html>
