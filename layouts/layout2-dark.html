<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrift - Smart Spending Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e27;
      color: #e5e7eb;
      line-height: 1.6;
    }
    header {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 1.4rem; font-weight: 800; color: #00d4ff; }
    .btn { padding: 10px 20px; border: none; background: linear-gradient(135deg, #00d4ff, #0099ff); color: #000; border-radius: 8px; cursor: pointer; font-weight: 700; }
    nav { display: flex; gap: 32px; padding: 0 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    nav button { border: none; background: none; padding: 16px 0; font-size: 0.9rem; color: #8892b0; cursor: pointer; border-bottom: 2px solid transparent; }
    nav button.active { color: #00d4ff; border-bottom: 2px solid #00d4ff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 24px; }
    .hero h1 { font-size: 3.5rem; margin-bottom: 16px; font-weight: 800; line-height: 1.1; background: linear-gradient(135deg, #00d4ff, #00f7ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { font-size: 1.1rem; color: #8892b0; max-width: 600px; margin-bottom: 32px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin: 60px 0; }
    .stat { border: 1px solid rgba(0,212,255,0.2); padding: 32px; border-radius: 12px; background: rgba(0,212,255,0.05); }
    .stat-label { font-size: 0.85rem; color: #6b7280; text-transform: uppercase; margin-bottom: 12px; }
    .stat-value { font-size: 2.5rem; font-weight: 800; color: #00d4ff; }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">◆ THRIFT</div>
  <button class="btn">Launch</button>
</header>

<nav>
  <button class="active">Home</button>
  <button>Dashboard</button>
  <button>Insights</button>
  <button>Settings</button>
</nav>

<div class="container">
  <div class="hero">
    <h1>Control Your Money</h1>
    <p>Real-time insights. Zero complexity. Your data, always private.</p>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Week</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Month</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Income</div>
      <div class="stat-value">€0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Balance</div>
      <div class="stat-value">€0</div>
    </div>
  </div>

  <p style="color: #4b5563; text-align: center; margin-top: 60px;">Privacy First. Always.</p>
</div>
</body>
</html>
