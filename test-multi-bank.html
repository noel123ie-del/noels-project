// ==== Copy of parser logic from bold/app.html ====
function parseCSVLine(line, delim = ',') {
  const cols = [];
  let curr = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i+1] === '"') { curr += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === delim && !inQuotes) { cols.push(curr.trim()); curr = ''; }
    else curr += c;
  }
  cols.push(curr.trim());
  return cols;
}

function detectDelimiter(lines) {
  const candidates = [',', ';', '\t', '|'];
  let best = ',', bestScore = 0;
  const sample = lines.slice(0, Math.min(10, lines.length));
  for (const d of candidates) {
    const counts = sample.map(l => (l.match(new RegExp('\\' + d, 'g')) || []).length);
    const avg = counts.reduce((a,b)=>a+b,0) / counts.length;
    if (avg > bestScore) { bestScore = avg; best = d; }
  }
  return best;
}

function parseAnyDate(s) {
  if (s === null || s === undefined) return null;
  s = String(s).replace(/"/g, '').trim();
  if (!s) return null;
  let m = s.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if (m) {
    const a = parseInt(m[1]), b = parseInt(m[2]);
    if (a > 12) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    if (b > 12) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  m = s.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2})(?:\D|$)/);
  if (m) {
    const yy = parseInt(m[3]);
    const yyyy = yy < 50 ? 2000 + yy : 1900 + yy;
    return `${yyyy}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  }
  const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  m = s.match(/(\d{1,2})[\s\-]+([A-Za-z]{3,})[\s\-]+(\d{2,4})/);
  if (m) {
    const mn = months[m[2].toLowerCase().slice(0,3)];
    if (mn) {
      let y = parseInt(m[3]);
      if (y < 100) y = y < 50 ? 2000 + y : 1900 + y;
      return `${y}-${String(mn).padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    }
  }
  m = s.match(/([A-Za-z]{3,})\s+(\d{1,2}),?\s+(\d{2,4})/);
  if (m) {
    const mn = months[m[1].toLowerCase().slice(0,3)];
    if (mn) {
      let y = parseInt(m[3]);
      if (y < 100) y = y < 50 ? 2000 + y : 1900 + y;
      return `${y}-${String(mn).padStart(2,'0')}-${m[2].padStart(2,'0')}`;
    }
  }
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
  return null;
}

function parseAmount(raw) {
  if (raw === null || raw === undefined) return null;
  let s = String(raw).replace(/"/g, '').trim();
  if (!s) return null;
  let isNegative = false;
  if (/^\(.*\)$/.test(s)) { isNegative = true; s = s.slice(1, -1); }
  if (/-$/.test(s)) { isNegative = true; s = s.slice(0, -1); }
  if (/\s*DR\s*$/i.test(s)) { isNegative = true; s = s.replace(/\s*DR\s*$/i, ''); }
  if (/\s*CR\s*$/i.test(s)) { s = s.replace(/\s*CR\s*$/i, ''); }
  if (/^-/.test(s)) { isNegative = true; s = s.slice(1); }
  s = s.replace(/[€$£¥₹\s]/g, '').replace(/[A-Z]{3}$/i, '').trim();
  if (!s) return null;
  const lastComma = s.lastIndexOf(',');
  const lastDot = s.lastIndexOf('.');
  if (lastComma > lastDot) s = s.replace(/\./g, '').replace(',', '.');
  else s = s.replace(/,/g, '');
  const n = parseFloat(s);
  if (isNaN(n)) return null;
  return isNegative ? -n : n;
}

function detectColumns(header) {
  const h = header.map(x => x.toLowerCase().trim());
  const findOne = (patterns) => {
    for (const p of patterns) {
      const useWordBoundary = p.length <= 4 || /^(in|out|net|gross)$/.test(p);
      const idx = useWordBoundary
        ? h.findIndex(x => new RegExp('(^|[^a-z])' + p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '($|[^a-z])').test(x))
        : h.findIndex(x => x === p || x.includes(p));
      if (idx !== -1) return idx;
    }
    return -1;
  };
  return {
    date: findOne(['posted transactions date','posted transaction date','completed date','transaction date','started date','posted date','value date','booking date','date completed','finished on','created on','date posted','transaction time','date']),
    desc: findOne(['description1','description','details','narrative','merchant','counter party','partner name','payee','name','reference','memo','subject','transaction details','particulars']),
    debit: findOne(['debit amount','debit','withdrawal','withdrawals','money out','paid out','spent','expense']),
    credit: findOne(['credit amount','credit','deposit','deposits','money in','paid in','received','income']),
    amount: findOne(['transaction amount','amount (eur)','amount (gbp)','amount (usd)','local amount','amount','value','gross','net']),
    type: findOne(['transaction type','direction','dr/cr','type']),
    category: findOne(['spending category','category']),
  };
}

function findHeaderRow(lines, delim) {
  for (let i = 0; i < Math.min(15, lines.length); i++) {
    const cols = parseCSVLine(lines[i], delim);
    if (cols.length < 3) continue;
    const det = detectColumns(cols);
    const hasDate = det.date !== -1;
    const hasMoney = det.debit !== -1 || det.credit !== -1 || det.amount !== -1;
    if (hasDate && hasMoney) return i;
  }
  return 0;
}

function parseCSV(csvText) {
  let text = csvText.replace(/^﻿/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { error: 'empty' };
  const delim = detectDelimiter(lines);
  const headerIdx = findHeaderRow(lines, delim);
  const header = parseCSVLine(lines[headerIdx], delim);
  const cols = detectColumns(header);
  if (cols.date === -1 || cols.desc === -1 || (cols.debit === -1 && cols.credit === -1 && cols.amount === -1)) {
    return { error: 'no format detected', delim, headerIdx, header, cols };
  }
  let imported = 0, skipped = 0;
  const txns = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const parts = parseCSVLine(lines[i], delim);
    if (parts.length < 2) { skipped++; continue; }
    if (/^(total|opening|closing|balance|sum)/i.test(parts[0])) { skipped++; continue; }
    const date = parseAnyDate(parts[cols.date] || '');
    const desc = (parts[cols.desc] || '').replace(/"/g, '').trim();
    if (!date || !desc) { skipped++; continue; }
    let amountVal = 0, isIncome = false;
    if (cols.debit !== -1 || cols.credit !== -1) {
      const debit = parseAmount(parts[cols.debit] || '') || 0;
      const credit = parseAmount(parts[cols.credit] || '') || 0;
      if (Math.abs(debit) > 0) { amountVal = Math.abs(debit); isIncome = false; }
      else if (Math.abs(credit) > 0) { amountVal = Math.abs(credit); isIncome = true; }
    } else {
      const raw = parseAmount(parts[cols.amount] || '');
      if (raw === null || raw === 0) { skipped++; continue; }
      amountVal = Math.abs(raw);
      isIncome = raw > 0;
    }
    if (!amountVal) { skipped++; continue; }
    txns.push({ date, desc, amount: amountVal, isIncome });
    imported++;
  }
  return { imported, skipped, txns, delim, header };
}

// ==== Run tests ====
const results = document.getElementById('results');
let passed = 0, failed = 0;
for (const t of tests) {
  const r = parseCSV(t.csv);
  const div = document.createElement('div');
  div.className = 'test';
  let ok = false;
  let detail = '';
  if (r.error) {
    detail = `❌ ERROR: ${r.error}\nDelimiter: "${r.delim}"\nHeaders: ${(r.header||[]).join(' | ')}\nCols: ${JSON.stringify(r.cols)}`;
  } else {
    const meets = r.imported >= t.expectMin && (!t.expectMax || r.imported <= t.expectMax);
    ok = meets;
    detail = `Imported: ${r.imported} | Skipped: ${r.skipped} | Delimiter: "${r.delim}"\nFirst tx: ${r.txns[0] ? `${r.txns[0].date} | ${r.txns[0].desc} | €${r.txns[0].amount} | ${r.txns[0].isIncome ? 'INCOME' : 'SPEND'}` : 'none'}`;
  }
  div.className = 'test ' + (ok ? 'pass' : 'fail');
  div.innerHTML = `<div class="title">${ok ? '✅' : '❌'} ${t.name}</div><div class="detail">${detail}</div>`;
  results.appendChild(div);
  if (ok) passed++; else failed++;
}

const summary = document.getElementById('summary');
summary.style.borderColor = failed === 0 ? '#4ade80' : '#ff4757';
summary.innerHTML = `<strong>${passed}/${tests.length} passed</strong> · ${failed} failed`;
